<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lexia — Acceso</title>
<link rel="stylesheet" href="/styles.css" />
<style>
  .auth-wrap { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
  .auth-card { width: 100%; max-width: 420px; background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); padding: 32px; }
  .auth-card h1 { font-size: 22px; margin: 0 0 4px; }
  .auth-card .sub { color: var(--muted); font-size: 14px; margin: 0 0 22px; }
  .tabs { display: flex; gap: 6px; margin-bottom: 20px; background: var(--bg); border: 1px solid var(--line); border-radius: 10px; padding: 4px; }
  .tabs button { flex: 1; background: transparent; border: 0; color: var(--muted); padding: 9px; border-radius: 8px; font-weight: 600; }
  .tabs button.active { background: var(--panel2); color: var(--txt); }
  .auth-card label { font-size: 13px; color: var(--muted); display: block; margin: 0 0 6px; }
  .auth-card input { width: 100%; background: var(--panel2); border: 1px solid var(--line); border-radius: 10px; color: var(--txt); padding: 12px; font: inherit; margin-bottom: 14px; }
  .auth-card .btn { width: 100%; }
  .auth-msg { font-size: 13px; margin-top: 12px; min-height: 18px; }
  .auth-foot { text-align: center; margin-top: 18px; font-size: 13px; }
  .field-organizacion { display: none; }
  body.register .field-organizacion { display: block; }
</style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <h1>Lexia <span class="brand"><span class="accent">⚖</span></span></h1>
      <p class="sub">Acceso para organizaciones · IA jurídico-administrativa local</p>
      <div class="tabs">
        <button id="tab-login" class="active">Entrar</button>
        <button id="tab-register">Crear cuenta</button>
      </div>
      <form id="auth-form">
        <div class="field-organizacion">
          <label for="organizacion">Organización / entidad</label>
          <input type="text" id="organizacion" placeholder="Nombre de tu organización" autocomplete="organization" />
        </div>
        <label for="email">Email profesional</label>
        <input type="email" id="email" placeholder="tu@organizacion.es" autocomplete="email" required />
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="Mínimo 8 caracteres" autocomplete="current-password" required />
        <button class="btn" type="submit" id="submit">Entrar</button>
        <p class="auth-msg" id="msg"></p>
      </form>
      <p class="auth-foot"><a href="/">← Volver a la web</a></p>
    </div>
  </div>

<script>
let mode = 'login';
const body = document.body;
const tabLogin = document.getElementById('tab-login');
const tabReg = document.getElementById('tab-register');
const submit = document.getElementById('submit');
const msg = document.getElementById('msg');

function setMode(m) {
  mode = m;
  body.classList.toggle('register', m === 'register');
  tabLogin.classList.toggle('active', m === 'login');
  tabReg.classList.toggle('active', m === 'register');
  submit.textContent = m === 'login' ? 'Entrar' : 'Crear cuenta';
  document.getElementById('organizacion').required = (m === 'register');
  msg.textContent = '';
}
tabLogin.onclick = () => setMode('login');
tabReg.onclick = () => setMode('register');

// Si ya hay sesión, ir directo a la app
fetch('/api/me').then((r) => { if (r.ok) location.href = '/app.html'; });

document.getElementById('auth-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  msg.textContent = 'Procesando…'; msg.className = 'auth-msg';
  submit.disabled = true;
  const payload = {
    email: document.getElementById('email').value,
    password: document.getElementById('password').value,
  };
  if (mode === 'register') payload.organizacion = document.getElementById('organizacion').value;
  try {
    const r = await fetch('/api/' + (mode === 'login' ? 'login' : 'register'), {
      method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify(payload),
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Error');
    location.href = '/app.html';
  } catch (err) {
    msg.textContent = err.message; msg.className = 'auth-msg msg-err';
    submit.disabled = false;
  }
});
</script>
</body>
</html>
